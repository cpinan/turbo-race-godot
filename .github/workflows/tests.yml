name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gut:
    name: GUT headless
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4.7
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Import project
        run: godot --headless --path . --import 2>&1 | tail -5 || true

      - name: Run GUT tests
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -gdir=res://tests -gprefix=test_ -ginclude_subdirs -gexit
